async function findCarId() {
  const snap = await getDocs(collection(db, `${ORG}/cars`));
  for (const d of snap.docs) {
    if (d.data().plate === 'PQJ 1568') return d.id;
  }
  return null;
}

function log(msg, type='info') {
  const el = document.getElementById('log');
  el.style.display = 'block';
  el.innerHTML += `<div class="log-${type}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

window.doLogin = async function() {
  try { await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch(e) { if (e.code !== 'auth/popup-closed-by-user') alert('登录失败: ' + e.message); }
};

onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById('login-section').classList.add('hidden');
    document.getElementById('import-section').classList.remove('hidden');
    document.getElementById('user-status').textContent = `✅ 已登录：${user.email}`;
  } else {
    document.getElementById('login-section').classList.remove('hidden');
    document.getElementById('import-section').classList.add('hidden');
  }
});

window.startImport = async function() {
  const btn = document.getElementById('import-btn');
  btn.disabled = true;
  btn.textContent = '导入中，请勿关闭此页面…';
  document.getElementById('progress-bar').style.display = 'block';
  const fill = document.getElementById('progress-fill');
  const statusEl = document.getElementById('import-status');

  log('🔍 正在查找车辆 PQJ 1568…', 'info');
  let carId;
  try {
    carId = await findCarId();
    if (!carId) {
      log('❌ 找不到车辆 PQJ 1568，请确认已在 Auto Log 系统中添加此车辆。', 'err');
      btn.disabled = false; btn.textContent = '🚀 开始导入 190 条加油记录';
      return;
    }
    log(`✅ 找到车辆，ID: ${carId}`, 'ok');
  } catch(e) {
    log(`❌ 查询车辆失败: ${e.message}`, 'err');
    btn.disabled = false; return;
  }

  const colRef = collection(db, `${ORG}/cars/${carId}/fuel`);
  let success = 0, failed = 0;
  const total = RAW_DATA.length;

  for (let i = 0; i < total; i++) {
    const [date, km, liters, amount, isFull] = RAW_DATA[i];
    const price = +(amount / liters).toFixed(4);
    const notFull = !isFull;
    try {
      await addDoc(colRef, {
        date, km, liters, price,
        total: amount,
        station: '未填写',
        type: 'RON95',
        note: '历史导入',
        notFull,
        addedBy: '历史导入',
        addedAt: serverTimestamp()
      });
      success++;
      if (i % 10 === 0 || i === total - 1)
        log(`[${i+1}/${total}] ✅ ${date} · ${km.toLocaleString()} km · ${liters}L · RM${amount}${notFull?' · 未加满':''}`, 'ok');
    } catch(e) {
      failed++;
      log(`[${i+1}/${total}] ❌ 失败: ${date} · ${e.message}`, 'err');
    }
    fill.style.width = `${Math.round((i+1)/total*100)}%`;
    statusEl.textContent = `进度：${i+1} / ${total}`;
    if (i % 20 === 19) await new Promise(r => setTimeout(r, 300));
  }

  log(`\n🎉 导入完成！成功 ${success} 条，失败 ${failed} 条。`, success === total ? 'ok' : 'warn');
  statusEl.textContent = `完成！✅ ${success} 条成功${failed ? `，❌ ${failed} 条失败` : ''}`;
  btn.textContent = '✅ 导入完成';
  fill.style.background = success === total ? '#40c080' : '#e8a020';
};
